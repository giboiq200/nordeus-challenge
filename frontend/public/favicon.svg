<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0d0d1e"/>

  <!-- Sword blade -->
  <polygon points="15,4 17,4 16.5,22 15.5,22" fill="#c8c8e8"/>
  <polygon points="15.2,4 16.8,4 16.3,18 15.7,18" fill="#e8e8ff"/>

  <!-- Crossguard -->
  <rect x="9" y="13" width="14" height="3" rx="1.5" fill="#c4a855"/>
  <!-- Crossguard gems -->
  <circle cx="11" cy="14.5" r="1.5" fill="#7b3ff7"/>
  <circle cx="21" cy="14.5" r="1.5" fill="#7b3ff7"/>

  <!-- Handle -->
  <rect x="14.5" y="16" width="3" height="8" rx="1" fill="#8b6a2a"/>
  <line x1="14.5" y1="18" x2="17.5" y2="18" stroke="#4a2a08" stroke-width="0.8"/>
  <line x1="14.5" y1="20" x2="17.5" y2="20" stroke="#4a2a08" stroke-width="0.8"/>
  <line x1="14.5" y1="22" x2="17.5" y2="22" stroke="#4a2a08" stroke-width="0.8"/>

  <!-- Pommel -->
  <ellipse cx="16" cy="25" rx="2.5" ry="2" fill="#c4a855"/>

  <!-- Magic glow particles -->
  <circle cx="11" cy="8" r="1" fill="#b884ff" opacity="0.8"/>
  <circle cx="21" cy="10" r="0.8" fill="#b884ff" opacity="0.6"/>
  <circle cx="10" cy="14" r="0.7" fill="#7b3ff7" opacity="0.7"/>
</svg>